ifdh_art = { path = "../ifdh_art" }
ifdhc = { path = "../ifdhc" }
ifdhc_config = { path = "../ifdhc_config" }
larana = { path = "../larana" }
larcore = { path = "../larcore" }
larcorealg = { path = "../larcorealg" }
larcoreobj = { path = "../larcoreobj" }
lardata = { path = "../lardata" }
lardataalg = { path = "../lardataalg" }
lardataobj = { path = "../lardataobj" }
lareventdisplay = { path = "../lareventdisplay" }
larevt = { path = "../larevt" }
larexamples = { path = "../larexamples" }
larfinder = { path = "../larfinder" }
