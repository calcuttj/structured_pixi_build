# rattler-build recipe (v1 / CEP-13 format) for ifdhc_config.
#
# ifdhc_config is the configuration half of fnal-fife/ifdhc: ifdh.cfg plus a few
# helper shell scripts (www_cp/auth_session/decode_token). No compilation. It is
# split out from ifdhc so consuming environments resolve these files here (the
# ifdhc package deletes them from its own bin). Built from the same ifdhc source
# tarball. Required (transitively) by the ifdh data-handling stack -> nugen ->
# larsim. Absent from conda-forge. Mirrors the FNAL spack ifdhc_config package.

context:
  version: "2.8.1"
  v_under: ${{ version | replace(".", "_") }}

package:
  name: ifdhc_config
  version: ${{ version }}

source:
  url: https://github.com/fnal-fife/ifdhc/archive/refs/tags/v${{ v_under }}.tar.gz
  sha256: caf5c88cd6eed51eb425b01140bf6a36fe5f3fad98b9bd12ff5b0896f803c847

build:
  number: 0
  script: build.sh
  noarch: generic

requirements: {}

tests:
  - package_contents:
      files:
        - ifdh.cfg
        - bin/www_cp.sh
        - bin/auth_session.sh
        - bin/decode_token.sh

about:
  homepage: https://github.com/fnal-fife/ifdhc
  repository: https://github.com/fnal-fife/ifdhc
  license: Apache-2.0
  summary: ifdhc_config -- configuration (ifdh.cfg + scripts) for the ifdh data-handling client
  description: |
    Configuration files for the ifdh intensity-frontier data-handling client:
    ifdh.cfg and the www_cp / auth_session / decode_token helper scripts. Split
    out from ifdhc so that environments resolve these files from this package.

extra:
  recipe-maintainers:
    - calcuttj
