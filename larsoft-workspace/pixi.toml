[workspace]
authors = ["Jacob Calcutt <jcalcutt@bnl.gov>"]
channels = ["conda-forge", "file:///nfs/data/1/calcuttj/wirecell_pixi_test/conda/structured_pixi_build/art-channel", "file:///nfs/data/1/calcuttj/wirecell_pixi_test/conda/structured_pixi_build/wct-channel"]
name = "larsoft-workspace"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

# Central variant pins (the pixi-build-rattler-build backend ignores each recipe's
# conda_build_config.yaml, so every pin lives here). Matches art_workspace so WCT is
# co-installable with the art stack.
[workspace.build-variants]
c_stdlib = ["sysroot"]
c_stdlib_version = ["2.17"]
libboost_devel = ["1.90"]
libboost_headers = ["1.90"]
libboost_python_devel = ["1.90"]
# ROOT: recipe now deps root_base 6.36.* (was the `root` metapackage); single-valued
# root_base + root_cxx_standard = one combo, so no zip_keys entry needed.
root_base = ["6.36.6"]
root_cxx_standard = ["20"]
# geant4 11.4.2 has no py3.14 build, but current CF root_base 6.36.06 is np2py314;
# pin python 3.13 so root_base + geant4 co-resolve (art/wct pkgs carry no python run-dep).
python = ["3.13"]
hdf5 = ["1.14"]

