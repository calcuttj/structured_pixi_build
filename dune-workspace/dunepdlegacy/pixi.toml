[package]
name = "dunepdlegacy"
version = "1.1.4"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.*" }

[package.build.config]
extra-input-globs = ["build.sh"]

# Inter-member SOURCE deps = transitive sibling closure (a sibling's
# run_export pins propagate into this build's host env); binary deps
# (larsoft/art/root_base/geant4/... from channels) stay in recipe.yaml only.
[package.host-dependencies]
artdaq_core = { path = "../artdaq_core" }
trace = { path = "../trace" }
