[package]
name = "dunesw"
version = "10.21.1"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.*" }

[package.build.config]
extra-input-globs = ["build.sh"]

# Inter-member SOURCE deps = transitive sibling closure (a sibling's
# run_export pins propagate into this build's host env); binary deps
# (larsoft/art/root_base/geant4/... from channels) stay in recipe.yaml only.
[package.host-dependencies]
artdaq_core = { path = "../artdaq_core" }
duneana = { path = "../duneana" }
duneanaobj = { path = "../duneanaobj" }
dunecalib = { path = "../dunecalib" }
dunecore = { path = "../dunecore" }
dunedaqdataformats = { path = "../dunedaqdataformats" }
dunedataprep = { path = "../dunedataprep" }
dunedetdataformats = { path = "../dunedetdataformats" }
duneexamples = { path = "../duneexamples" }
duneopdet = { path = "../duneopdet" }
dunepdlegacy = { path = "../dunepdlegacy" }
duneprototypes = { path = "../duneprototypes" }
dunereco = { path = "../dunereco" }
dunesim = { path = "../dunesim" }
geant4reweight = { path = "../geant4reweight" }
highfive = { path = "../highfive" }
protoduneana = { path = "../protoduneana" }
srproxy = { path = "../srproxy" }
trace = { path = "../trace" }

# Runtime member deps (recipe `run:`) — resolve from source.
[package.run-dependencies]
duneana = { path = "../duneana" }
dunedataprep = { path = "../dunedataprep" }
duneexamples = { path = "../duneexamples" }
protoduneana = { path = "../protoduneana" }
