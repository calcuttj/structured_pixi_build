# rattler-build recipe (v1 / CEP-13 format) for HighFive 2.4.1.
#
# HighFive is a header-only C++ wrapper over the HDF5 C library. dunesw's
# dunecore pins `highfive v2_4_1_3b` (HighFive 2.4.x) via ups/product_deps, and
# its vendored DUNE-DAQ hdf5libs code (dunecore/HDF5Utils/dunedaqhdf5utils2,3)
# is written against the 2.x API (broad HighFive::Group/File/DataSet surface +
# DataSet::read(raw_ptr), an overload reworked in HighFive 3.x). conda-forge only
# ships HighFive 3.x (an API break), so we package 2.4.1 here to match the pin
# and avoid patching vendored code we don't own. Header-only => trivial build.
#
# Install layout matters: dunecore does `find_package(HighFive)` then
# `include_directories("${HighFive_DIR}/../../../include")`. HighFive installs its
# CMake config to share/HighFive/CMake, so HighFive_DIR/../../../include == $PREFIX/
# include (where the headers land) — the walk resolves correctly.

context:
  version: "2.4.1"

package:
  name: highfive
  version: ${{ version }}

source:
  url: https://github.com/BlueBrain/HighFive/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6826471ef5c645ebf947d29574b302991525a8a8ff1ef687aba7311d9a0ea36f

build:
  number: 0
  script: build.sh
  skip: not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    # HighFive's CMake config does find_package(HDF5); pull the HDF5 C libs so the
    # generated HighFiveConfig.cmake resolves for consumers (dunecore).
    - hdf5
  run:
  run_exports:
    # Cap at the 2.x series (HighFive 2.x -> 3.x is an API break); dunecore must
    # not be handed conda-forge's 3.x. upper_bound='x' => >=2.4.1,<3.
    - ${{ pin_subpackage('highfive', upper_bound='x') }}

tests:
  - package_contents:
      include:
        - highfive/H5File.hpp
        - highfive/H5Group.hpp
        - highfive/H5DataSet.hpp
      files:
        - share/HighFive/CMake/HighFiveConfig.cmake

about:
  homepage: https://github.com/BlueBrain/HighFive
  repository: https://github.com/BlueBrain/HighFive
  license: BSL-1.0
  license_file: LICENSE
  summary: HighFive - Header-only C++ HDF5 interface (2.4.x, for dunesw/dunecore)
  description: |
    HighFive is a modern header-only C++11 friendly interface for libhdf5.
    This recipe packages the 2.4.x series to satisfy DUNE dunecore
    (dunesw v10_21_01d00), whose vendored DUNE-DAQ hdf5libs code targets the
    HighFive 2.x API; conda-forge ships only the API-incompatible 3.x.

extra:
  recipe-maintainers:
    - calcuttj
